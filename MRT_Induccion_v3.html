<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRT — Inducción Interactiva v2 | Sync Global</title>
<style>
  :root{--neg:#000000;--oro:#C29B23;--oro2:#E5C158;--orotxt:#A07F15;--ok:#27AE60;--bad:#C0392B;--gris:#F7F4EC;--txt:#000000;}
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
  body{background:var(--gris);color:var(--txt);}
  .layout{display:flex;min-height:100vh;}
  aside{width:280px;background:var(--neg);color:#fff;padding:24px 0;position:fixed;top:0;bottom:0;overflow-y:auto;}
  aside h1{font-size:22px;padding:0 20px 4px;color:var(--oro2);}
  aside .sub{font-size:12px;opacity:.8;padding:0 20px 16px;border-bottom:1px solid rgba(255,255,255,.2);}
  .navitem{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;font-size:14px;border-left:4px solid transparent;}
  .navitem:hover{background:rgba(255,255,255,.08);}
  .navitem.active{background:rgba(255,255,255,.14);border-left-color:var(--oro2);font-weight:600;}
  .navitem .dot{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
  .navitem.done .dot{background:var(--ok);border-color:var(--ok);}
  .progresswrap{padding:16px 20px;}
  .progressbar{background:rgba(255,255,255,.2);border-radius:8px;height:10px;overflow:hidden;}
  .progressbar>div{background:var(--oro2);height:100%;width:0;transition:width .4s;}
  .progresstxt{font-size:12px;margin-top:6px;opacity:.9;}
  main{margin-left:280px;flex:1;padding:36px 48px;max-width:1000px;}
  main.full{margin-left:0;max-width:760px;margin:0 auto;}
  .card{background:#fff;border-radius:12px;padding:28px 32px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:20px;}
  h2{color:var(--neg);font-size:26px;margin-bottom:6px;}
  h3{color:var(--orotxt);font-size:18px;margin:18px 0 8px;}
  p,li{font-size:15px;line-height:1.6;margin-bottom:8px;}
  ul{padding-left:22px;margin-bottom:10px;}
  .tag{display:inline-block;background:var(--oro);color:#000;font-size:12px;font-weight:600;padding:3px 10px;border-radius:12px;margin-bottom:10px;}
  .rule{background:var(--gris);border-left:5px solid var(--bad);padding:12px 16px;border-radius:0 8px 8px 0;margin:8px 0;font-size:15px;}
  .btn{background:var(--oro2);color:#000;border:none;padding:12px 26px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;margin-right:8px;}
  .btn:hover{filter:brightness(1.05);}
  .btn.sec{background:var(--oro);color:#000;}
  .btn.dark{background:var(--neg);color:var(--oro2);}
  .btn:disabled{background:#bbb;cursor:not-allowed;}
  .q{background:var(--gris);border-radius:10px;padding:16px 18px;margin:12px 0;}
  .q p{font-weight:600;}
  .opt{display:block;background:#fff;border:2px solid #ddd;border-radius:8px;padding:10px 14px;margin:8px 0;cursor:pointer;font-size:14px;}
  .opt:hover{border-color:var(--oro);}
  .opt.sel{border-color:var(--oro);background:#F8F1DC;}
  .opt.right{border-color:var(--ok);background:#E8F8EF;}
  .opt.wrong{border-color:var(--bad);background:#FDEDEB;}
  .feedback{font-size:14px;font-weight:600;margin-top:6px;display:none;}
  .score{font-size:18px;font-weight:700;margin-top:14px;display:none;}
  input[type=text],input[type=password],textarea,select{padding:10px 12px;border:2px solid #ccc;border-radius:8px;font-size:14px;width:100%;max-width:100%;font-family:inherit;background:#fff;}
  textarea{min-height:64px;resize:vertical;}
  .check{display:flex;align-items:flex-start;gap:10px;background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:10px 14px;margin:6px 0;font-size:14px;cursor:pointer;}
  .check input{margin-top:3px;transform:scale(1.3);width:auto;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  .mini{background:var(--gris);border-radius:10px;padding:14px 16px;}
  .mini b{color:var(--orotxt);}
  .stat{background:var(--neg);color:var(--oro2);border-radius:10px;padding:16px;text-align:center;}
  .stat .big{font-size:28px;font-weight:800;}
  .stat .lbl{font-size:12px;color:#D9D9D9;margin-top:4px;}
  table{width:100%;border-collapse:collapse;margin:10px 0;font-size:14px;}
  th{background:var(--neg);color:var(--oro2);padding:8px 10px;text-align:left;}
  td{border:1px solid #ddd;padding:8px 10px;vertical-align:top;}
  .cert{border:6px double var(--neg);padding:40px;text-align:center;background:#fff;}
  .cert h2{font-size:30px;}
  .cert .name{font-size:26px;color:var(--oro);font-weight:700;margin:14px 0;}
  .locknote{font-size:13px;color:#888;font-style:italic;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:13px;font-weight:700;margin-bottom:4px;color:#333;}
  fieldset{border:2px solid var(--oro);border-radius:10px;padding:16px 18px;margin-bottom:22px;background:#fff;}
  legend{font-weight:800;color:var(--orotxt);padding:0 8px;font-size:16px;}
  .qz-block{border:1px solid #ddd;border-radius:10px;padding:12px;margin-bottom:12px;background:var(--gris);}
  .qz-block .row{display:flex;gap:8px;margin-top:6px;align-items:center;}
  .qz-block .row span{font-size:12px;font-weight:700;width:18px;}
  .del{background:var(--bad);color:#fff;border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;float:right;}
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--neg);}
  .login{background:#fff;border-radius:14px;padding:40px;max-width:520px;width:92%;text-align:center;border-top:8px solid var(--oro2);}
  .login h1{color:var(--neg);font-size:30px;}
  .login .gold{color:var(--orotxt);font-weight:700;}
  .rolebtn{display:block;width:100%;margin:10px 0;padding:16px;border-radius:10px;border:2px solid var(--oro);background:#fff;font-size:16px;font-weight:700;cursor:pointer;}
  .rolebtn:hover{background:#F8F1DC;}
  .rolebtn small{display:block;font-weight:400;color:#666;margin-top:3px;}
  .badge-admin{background:var(--neg);color:var(--oro2);font-size:11px;padding:2px 8px;border-radius:10px;margin-left:6px;}
  @media print{aside,.btn,.noprint{display:none!important;}main{margin:0;padding:0;}body{background:#fff;}}
  @media(max-width:820px){aside{position:static;width:100%;}main{margin:0;padding:20px;}.layout{flex-direction:column;}.grid2,.grid3{grid-template-columns:1fr;}}
</style>
<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
<style>
  .sync-bar{position:fixed;bottom:0;left:0;right:0;background:var(--neg);color:var(--oro2);font-size:12px;padding:5px 14px;display:flex;align-items:center;gap:8px;z-index:9999;border-top:2px solid var(--oro);}
  .sync-dot{width:9px;height:9px;border-radius:50%;background:#ef4444;display:inline-block;flex-shrink:0;}
  .sync-dot.live{background:#22c55e;animation:sdpulse 2s infinite;}
  @keyframes sdpulse{0%,100%{opacity:1}50%{opacity:.4}}
  .sync-banner{background:#E8F8EF;border:1px solid #27AE60;border-radius:8px;padding:10px 16px;margin-bottom:14px;font-size:13px;color:#1a6e3a;display:none;}
  .sync-banner.show{display:block;}
</style>

<script>
/* ===== Copia prístina del documento (para exportar versiones editadas) ===== */
var PRISTINE = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;

/* ===== Configuración ===== */
function readBakedCfg(){ return JSON.parse(document.getElementById("mrt-config").textContent); }
var BAKED = readBakedCfg();
var CFG = JSON.parse(JSON.stringify(BAKED));
try{
  var ov = localStorage.getItem("mrt_cfg");
  if(ov){ ov = JSON.parse(ov); if(ov && ov.v === BAKED.version && ov.cfg){ CFG = ov.cfg; } }
}catch(e){}
// ============================
// GUN.JS — SYNC GLOBAL
// ============================
var FIXED_ROOM = 'mrt-induccion-mrt-2026';
var gun, room, gunReady = false;
var allCompletions = {}; // name -> {done, quiz, ts}

try {
  gun = Gun({peers:['https://peer.wallie.io/gun','https://gundb-relay-mlc.herokuapp.com/gun']});
  room = gun.get(FIXED_ROOM);
  gunReady = true;
  var sd = document.getElementById('syncDot');
  var sl = document.getElementById('syncLabel');
  if(sd) sd.classList.add('live');
  if(sl) sl.textContent = 'Sincronizado';
} catch(e) {
  var sl2 = document.getElementById('syncLabel');
  if(sl2) sl2.textContent = 'Sin red (solo local)';
}

function syncCfgToGun() {
  if(!gunReady) return;
  room.get('cfg').put(JSON.stringify(CFG));
}

function listenGun() {
  if(!gunReady) return;
  // Listen for admin CFG changes from any device
  room.get('cfg').on(function(v) {
    if(!v) return;
    try {
      var newCfg = JSON.parse(v);
      // Only update if different from current
      if(JSON.stringify(newCfg) !== JSON.stringify(CFG)) {
        CFG = newCfg;
        saveCfgLocal();
        // Re-render current view silently
        if(S.role === 'user') { render(); }
        else if(S.role === 'admin') { renderAdmin(); }
        showSyncBanner('✅ Contenido actualizado por RRHH desde otra computadora.');
      }
    } catch(ex) {}
  });
  // Listen for user completions
  room.get('completions').on(function(data) {
    if(!data) return;
    try {
      Object.keys(data).forEach(function(k) {
        if(k === '_') return;
        var v = data[k];
        if(typeof v === 'string') {
          try { allCompletions[k] = JSON.parse(v); } catch(ex) {}
        }
      });
      // If admin is watching results, refresh
      if(S.role === 'admin') {
        var el = document.getElementById('resultsPanel');
        if(el) el.innerHTML = buildResultsHTML();
      }
    } catch(ex) {}
  });
}

function pushUserCompletion() {
  if(!gunReady || !S.name) return;
  room.get('completions').get(S.name).put(JSON.stringify({
    done: S.done, quiz: S.quiz, ts: Date.now()
  }));
}

function showSyncBanner(msg) {

var picks={};
function pick(el,key,qi,oi){
  picks[key]=picks[key]||{}; picks[key][qi]=oi;
  var sibs = el.parentElement.querySelectorAll(".opt");
  for(var i=0;i<sibs.length;i++){ sibs[i].classList.remove("sel"); }
  el.classList.add("sel");
}
function grade(key,n){
  var p=picks[key]||{};
  if(Object.keys(p).length<n){ notify("Responde todas las preguntas antes de calificar."); return; }
  var ok=0;
  var qdivs=document.querySelectorAll('.q[data-key="'+key+'"]');
  for(var d=0; d<qdivs.length; d++){
    var qdiv=qdivs[d], qi=+qdiv.getAttribute("data-q"), ans=CFG.quizzes[key][qi].a, sel=p[qi];
    var opts=qdiv.querySelectorAll(".opt");
    for(var oi=0; oi<opts.length; oi++){
      opts[oi].classList.remove("right","wrong");
      if(oi===ans) opts[oi].classList.add("right");
      else if(oi===sel) opts[oi].classList.add("wrong");
    }
    var fb=qdiv.querySelector(".feedback"); fb.style.display="block";
    if(sel===ans){ ok++; fb.textContent="✔ Correcto"; fb.style.color="var(--ok)"; }
    else { fb.textContent="✘ Revisa la respuesta marcada en verde"; fb.style.color="var(--bad)"; }
  }
  var pct=Math.round(ok/n*100);
  var sc=document.getElementById("score-"+key); sc.style.display="block";
  if(pct>=80){
    sc.textContent="Resultado: "+pct+"% — ¡Módulo aprobado! Continúa con la siguiente sección."; sc.style.color="var(--ok)";
    S.quiz[key]=pct; S.done[key]=true; save(); pushUserCompletion(); renderNav();
  } else {
    sc.textContent="Resultado: "+pct+"% — Aún no apruebas. Repasa el contenido e inténtalo de nuevo."; sc.style.color="var(--bad)";
  }
}
function markDone(k){ S.done[k]=true; save(); pushUserCompletion(); renderNav(); notify("Sección registrada como completada ✓"); }
function setName(){
  var v=document.getElementById("inpname").value.trim();
  if(!v){ notify("Escribe tu nombre para comenzar."); return; }
  S.name=v; S.done["inicio"]=true; save(); go(1);
}
function resetUser(){ try{ localStorage.removeItem("mrt_induccion"); }catch(e){} S={role:"user",name:"",done:{},quiz:{},mod:0}; render(); }
function go(i){ S.mod=i; save(); render(); window.scrollTo(0,0); }
function renderNav(){
  var req=["inicio","PRE","A","B","C","D","P","CHK"];
  var doneCount=req.filter(function(k){return S.done[k];}).length;
  var pct=Math.round(doneCount/req.length*100);
  var pb=document.getElementById("pbar"), pt=document.getElementById("ptxt"), nv=document.getElementById("nav");
  if(!pb) return;
  pb.style.width=pct+"%";
  pt.textContent=pct+"% completado"+(S.name?" · "+S.name.split(" ")[0]:"");
  nv.innerHTML=MODS.map(function(m,i){
    return '<div class="navitem '+(i===S.mod?"active":"")+' '+(S.done[m.id]?"done":"")+'" onclick="go('+i+')">' +
    '<span class="dot">'+(S.done[m.id]?"✓":"")+'</span><span>'+m.nav+'</span></div>'; }).join("");
}

      h += '<div class="qz-block" data-quiz="'+key+'" data-idx="'+qi+'">' +
      '<button class="del" onclick="delQ(\''+key+'\','+qi+')">Eliminar</button>' +
      '<div class="field"><label>Pregunta '+(qi+1)+'</label><textarea class="qz-q">'+esc(item.q)+'</textarea></div>';
      item.o.forEach(function(o,oi){
        h += '<div class="row"><span>'+String.fromCharCode(65+oi)+'</span><input type="text" class="qz-o" value="'+esc(o)+'"></div>';
      });
      h += '<div class="row" style="margin-top:8px"><span>✔</span><select class="qz-a">' +
      item.o.map(function(_,oi){ return '<option value="'+oi+'" '+(item.a===oi?"selected":"")+'>Correcta: '+String.fromCharCode(65+oi)+'</option>'; }).join("") +
      '</select></div></div>';
    });
  });
  return h;
}
function addQ(key){ collectAdmin(); CFG.quizzes[key].push({q:"Nueva pregunta…",o:["Opción A","Opción B","Opción C"],a:0}); renderAdmin(); }
function delQ(key,qi){ collectAdmin(); CFG.quizzes[key].splice(qi,1); renderAdmin(); }
function collectAdmin(){
  var inputs=document.querySelectorAll("[data-path]");
  for(var i=0;i<inputs.length;i++){
    var el=inputs[i], v=el.value;
    if(el.getAttribute("data-lines")){ v=v.split("\n").map(function(x){return x.trim();}).filter(function(x){return x;}); }
    setPath(CFG, el.getAttribute("data-path"), v);
  }
  for(var k=0;k<4;k++){
    var n=document.getElementById("val-n-"+k), d=document.getElementById("val-d-"+k);
    if(n&&d){ CFG.empresa.valores[k]={n:n.value,d:d.value}; }
  }
  var blocks=document.querySelectorAll(".qz-block");
  var nq={};
  for(var b=0;b<blocks.length;b++){
    var bl=blocks[b], key=bl.getAttribute("data-quiz");
    nq[key]=nq[key]||[];
    var q=bl.querySelector(".qz-q").value;
    var os=bl.querySelectorAll(".qz-o"), oarr=[];
    for(var o=0;o<os.length;o++){ oarr.push(os[o].value); }
    var a=parseInt(bl.querySelector(".qz-a").value,10)||0;
    nq[key].push({q:q,o:oarr,a:a});
  }
  if(Object.keys(nq).length){ Object.keys(nq).forEach(function(k){ CFG.quizzes[k]=nq[k]; }); }
}
function saveAdmin(){
  collectAdmin();
  saveCfgLocal();
  syncCfgToGun();
  if(gunReady) {
    notify("✅ Cambios guardados y sincronizados. Todas las computadoras conectadas recibirán los cambios en segundos.");
  } else {
    notify("Cambios guardados localmente. Sin conexión a internet ahora; sincronizarán cuando haya red.");
  }
  renderAdmin();
}
function buildExportHtml(){
  collectAdmin();
  var out = JSON.parse(JSON.stringify(CFG));
  out.version = Date.now();
  var json = JSON.stringify(out, null, 1);
  var open = '<script id="mrt-config" type="application/json">';
  var i0 = PRISTINE.indexOf(open);
  var i1 = PRISTINE.indexOf("<\/script>", i0);
  return PRISTINE.slice(0, i0 + open.length) + json + PRISTINE.slice(i1);
}
function exportHtml(){
  var html = buildExportHtml();
  try{
    var blob = new Blob([html], {type:"text/html;charset=utf-8"});
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "MRT_Induccion_Interactiva.html";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    notify("Archivo descargado. Distribúyelo por correo, USB o carpeta compartida: funciona sin internet en cualquier computadora.");
  }catch(e){ notify("Tu navegador no permitió la descarga automática."); }
}
function resetCfg(){ CFG=JSON.parse(JSON.stringify(BAKED)); try{ localStorage.removeItem("mrt_cfg"); }catch(e){} renderAdmin(); }
function buildResultsHTML(){
  var keys=["PRE","A","B","C","P","D","CHK"];
  var names={PRE:"Pre-inducción",A:"Identidad MRT",B:"Seguridad",C:"RRHH",P:"Puesto 30·60·90",D:"Herramientas",CHK:"Checklist"};
  var completionList = Object.keys(allCompletions);
  if(completionList.length === 0){
    return '<p class="locknote" id="resultsPanel">Aún no hay completaciones registradas en la red. Cuando un colaborador apruebe un módulo, aparecerá aquí.</p>';
  }
  var h = '<div id="resultsPanel"><p style="font-size:13px;color:#555;margin-bottom:10px"><b>'+completionList.length+'</b> colaborador(es) con actividad registrada en la red:</p>';
  h += '<table><tr><th>Colaborador</th>';
  keys.forEach(function(k){ h += '<th>'+esc(names[k]||k)+'</th>'; });
  h += '<th>Última actividad</th></tr>';
  completionList.sort().forEach(function(nm){
    var data = allCompletions[nm];
    h += '<tr><td><b>'+esc(nm)+'</b></td>';
    keys.forEach(function(k){
      var approved = data.done && data.done[k];
      var score = data.quiz && data.quiz[k] != null ? data.quiz[k]+'%' : '';
      if(approved) h += '<td style="background:#E8F8EF;color:#1a6e3a;font-weight:700">✓ '+score+'</td>';
      else h += '<td style="color:#aaa">—</td>';
    });
    var ts = data.ts ? new Date(data.ts).toLocaleString('es-MX') : '—';
    h += '<td style="font-size:12px;color:#888">'+esc(ts)+'</td></tr>';
  });
  h += '</table></div>';
  return h;
}

function localResults(){
  return '<div id="resultsPanel">'+buildResultsHTML()+'</div>';
}
