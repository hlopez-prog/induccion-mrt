<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRT — Inducción Interactiva</title>
<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
<style>
  :root{--neg:#000000;--oro:#C29B23;--oro2:#E5C158;--orotxt:#A07F15;--ok:#27AE60;--bad:#C0392B;--gris:#F7F4EC;--txt:#000000;--azul:#1a3a5c;}
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
  body{background:var(--gris);color:var(--txt);}
  .layout{display:flex;min-height:100vh;}
  aside{width:280px;background:var(--neg);color:#fff;padding:24px 0;position:fixed;top:0;bottom:0;overflow-y:auto;}
  aside h1{font-size:22px;padding:0 20px 4px;color:var(--oro2);}
  aside .sub{font-size:12px;opacity:.8;padding:0 20px 16px;border-bottom:1px solid rgba(255,255,255,.2);}
  .navitem{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;font-size:14px;border-left:4px solid transparent;}
  .navitem:hover{background:rgba(255,255,255,.08);}
  .navitem.active{background:rgba(255,255,255,.14);border-left-color:var(--oro2);font-weight:600;}
  .navitem .dot{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
  .navitem.done .dot{background:var(--ok);border-color:var(--ok);}
  .progresswrap{padding:16px 20px;}
  .progressbar{background:rgba(255,255,255,.2);border-radius:8px;height:10px;overflow:hidden;}
  .progressbar>div{background:var(--oro2);height:100%;width:0;transition:width .4s;}
  .progresstxt{font-size:12px;margin-top:6px;opacity:.9;}
  main{margin-left:280px;flex:1;padding:36px 48px;max-width:1000px;}
  main.full{margin-left:0;max-width:800px;margin:0 auto;}
  .card{background:#fff;border-radius:12px;padding:28px 32px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:20px;}
  h2{color:var(--neg);font-size:26px;margin-bottom:6px;}
  h3{color:var(--orotxt);font-size:18px;margin:18px 0 8px;}
  p,li{font-size:15px;line-height:1.6;margin-bottom:8px;}
  ul{padding-left:22px;margin-bottom:10px;}
  .tag{display:inline-block;background:var(--oro);color:#000;font-size:12px;font-weight:600;padding:3px 10px;border-radius:12px;margin-bottom:10px;}
  .rule{background:var(--gris);border-left:5px solid var(--bad);padding:12px 16px;border-radius:0 8px 8px 0;margin:8px 0;font-size:15px;}
  .btn{background:var(--oro2);color:#000;border:none;padding:12px 26px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;margin-right:8px;}
  .btn:hover{filter:brightness(1.05);}
  .btn.sec{background:var(--oro);color:#000;}
  .btn.dark{background:var(--neg);color:var(--oro2);}
  .btn.green{background:var(--ok);color:#fff;}
  .btn.red{background:var(--bad);color:#fff;}
  .btn:disabled{background:#bbb;cursor:not-allowed;}
  .btn.sm{padding:6px 14px;font-size:13px;margin-top:0;}
  .q{background:var(--gris);border-radius:10px;padding:16px 18px;margin:12px 0;}
  .q p{font-weight:600;}
  .opt{display:block;background:#fff;border:2px solid #ddd;border-radius:8px;padding:10px 14px;margin:8px 0;cursor:pointer;font-size:14px;}
  .opt:hover{border-color:var(--oro);}
  .opt.sel{border-color:var(--oro);background:#F8F1DC;}
  .opt.right{border-color:var(--ok);background:#E8F8EF;}
  .opt.wrong{border-color:var(--bad);background:#FDEDEB;}
  .feedback{font-size:14px;font-weight:600;margin-top:6px;display:none;}
  .score{font-size:18px;font-weight:700;margin-top:14px;display:none;}
  input[type=text],input[type=email],input[type=password],textarea,select{padding:10px 12px;border:2px solid #ccc;border-radius:8px;font-size:14px;width:100%;max-width:100%;font-family:inherit;background:#fff;}
  input[type=text]:focus,input[type=email]:focus,input[type=password]:focus,textarea:focus,select:focus{border-color:var(--oro);outline:none;}
  textarea{min-height:64px;resize:vertical;}
  .check{display:flex;align-items:flex-start;gap:10px;background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:10px 14px;margin:6px 0;font-size:14px;cursor:pointer;}
  .check input{margin-top:3px;transform:scale(1.3);width:auto;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  .mini{background:var(--gris);border-radius:10px;padding:14px 16px;}
  .mini b{color:var(--orotxt);}
  .stat{background:var(--neg);color:var(--oro2);border-radius:10px;padding:16px;text-align:center;}
  .stat .big{font-size:28px;font-weight:800;}
  .stat .lbl{font-size:12px;color:#D9D9D9;margin-top:4px;}
  table{width:100%;border-collapse:collapse;margin:10px 0;font-size:14px;}
  th{background:var(--neg);color:var(--oro2);padding:8px 10px;text-align:left;}
  td{border:1px solid #ddd;padding:8px 10px;vertical-align:top;}
  tr:nth-child(even) td{background:#fafafa;}
  .cert{border:6px double var(--neg);padding:40px;text-align:center;background:#fff;}
  .cert h2{font-size:30px;}
  .cert .name{font-size:26px;color:var(--oro);font-weight:700;margin:14px 0;}
  .locknote{font-size:13px;color:#888;font-style:italic;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:13px;font-weight:700;margin-bottom:4px;color:#333;}
  .field label .req{color:var(--bad);}
  fieldset{border:2px solid var(--oro);border-radius:10px;padding:16px 18px;margin-bottom:22px;background:#fff;}
  legend{font-weight:800;color:var(--orotxt);padding:0 8px;font-size:16px;}
  .qz-block{border:1px solid #ddd;border-radius:10px;padding:12px;margin-bottom:12px;background:var(--gris);}
  .qz-block .row{display:flex;gap:8px;margin-top:6px;align-items:center;}
  .qz-block .row span{font-size:12px;font-weight:700;width:18px;}
  .del{background:var(--bad);color:#fff;border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;float:right;}
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--neg);}
  .login{background:#fff;border-radius:14px;padding:40px;max-width:520px;width:92%;text-align:center;border-top:8px solid var(--oro2);}
  .login h1{color:var(--neg);font-size:30px;}
  .login .gold{color:var(--orotxt);font-weight:700;}
  .rolebtn{display:block;width:100%;margin:10px 0;padding:16px;border-radius:10px;border:2px solid var(--oro);background:#fff;font-size:16px;font-weight:700;cursor:pointer;}
  .rolebtn:hover{background:#F8F1DC;}
  .rolebtn small{display:block;font-weight:400;color:#666;margin-top:3px;}
  .badge-admin{background:var(--neg);color:var(--oro2);font-size:11px;padding:2px 8px;border-radius:10px;margin-left:6px;}
  /* Sync indicator */
  .sync-bar{display:flex;align-items:center;gap:8px;background:#f0f9f0;border:1px solid #c3e6cb;border-radius:8px;padding:8px 14px;margin-bottom:16px;font-size:13px;}
  .sync-dot{width:9px;height:9px;border-radius:50%;background:#dc3545;flex-shrink:0;}
  .sync-dot.live{background:#28a745;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  /* Participants table */
  .p-table td.done-yes{color:var(--ok);font-weight:700;}
  .p-table td.done-no{color:#999;}
  .pct-bar{background:#e9ecef;border-radius:4px;height:8px;width:80px;display:inline-block;vertical-align:middle;margin-right:5px;}
  .pct-bar-fill{background:var(--oro2);height:8px;border-radius:4px;}
  /* Share URL */
  .share-box{background:#f0f4ff;border:1px solid #b8c4e0;border-radius:8px;padding:12px 16px;margin:10px 0;}
  .share-box input{background:#fff;font-family:monospace;font-size:12px;}
  /* Badge status */
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;}
  .badge.ok{background:#d4edda;color:#155724;}
  .badge.pend{background:#fff3cd;color:#856404;}
  .badge.no{background:#f8d7da;color:#721c24;}
  @media print{aside,.btn,.noprint{display:none!important;}main{margin:0;padding:0;}body{background:#fff;}}
  @media(max-width:820px){aside{position:static;width:100%;}main{margin:0;padding:20px;}.layout{flex-direction:column;}.grid2,.grid3{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="app"></div>
<script id="mrt-config" type="application/json">{
 "version": 1,
 "adminPass": "MRT2026",
 "empresa": {
   "historia": "[EDITAR: breve historia de MRT — cuándo nació, cómo creció, operaciones y clientes principales.]",
   "mision": "[EDITAR: misión oficial de MRT.]",
   "vision": "[EDITAR: visión oficial de MRT.]",
   "valores": [
     {"n": "[Valor 1 — EDITAR]", "d": "Qué significa en el día a día."},

 },

   "contactoNomina": "[EDITAR: contacto de nómina]",

 },
 "seguridad": {
   "reglas": ["Llego a trabajar descansado y libre de alcohol y drogas.", "Uso mi EPP completo y en buen estado donde se requiere, sin excepción.", "No opero equipos sin estar capacitado y autorizado.", "Respeto los permisos de trabajo de alto riesgo y el bloqueo y etiquetado (LOTO).", "Si una tarea no es segura, la detengo y la reporto. Tengo autoridad para parar el trabajo."],
   "emergencias": "[EDITAR: número o canal interno de emergencias]",

 },

   "rrhh": "[EDITAR: nombre · ext. · correo]",
   "ehs": "[EDITAR: nombre · ext. · correo]",
   "emergencias": "[EDITAR: número / canal de radio]"
 },
 "quizzes": {
   "PRE": [
     {"q": "Antes de tu primer día, ¿qué debes tener claro?", "o": ["Nada, todo se resuelve al llegar", "Dónde, cuándo y con quién presentarme, y qué debo llevar", "Solo mi sueldo"], "a": 1},
     {"q": "Si tienes dudas antes de tu ingreso, ¿qué haces?", "o": ["Espero a que me llamen", "Contacto a RRHH con los datos que vienen en este módulo", "Pregunto en redes sociales"], "a": 1},
     {"q": "¿Qué es el EPP que recibirás al ingresar?", "o": ["Equipo de Protección Personal, obligatorio según los riesgos de tu puesto", "Un uniforme decorativo opcional", "Equipo que debo comprar yo"], "a": 0}
   ],
   "A": [
     {"q": "¿Cuál es el propósito de la inducción a la empresa?", "o": ["Cumplir un trámite administrativo", "Conocer la identidad, valores y reglas de MRT para integrarme con éxito", "Solo conocer mi sueldo y prestaciones"], "a": 1},
     {"q": "Los valores de MRT son…", "o": ["Algo que solo aplica a los directivos", "La guía de cómo nos comportamos todos, todos los días", "Un texto decorativo de la pared"], "a": 1},

     {"q": "Si detecto una condición insegura debo…", "o": ["Reportarla de inmediato a mi supervisor; si hay riesgo grave, detener el trabajo", "Ignorarla si no es mi área", "Esperar a que alguien más la reporte"], "a": 0},
     {"q": "El Equipo de Protección Personal (EPP)…", "o": ["Es opcional si tengo experiencia", "Se usa completo y en buen estado en las áreas que lo requieren, sin excepción", "Solo se usa cuando hay auditoría"], "a": 1},
     {"q": "En caso de emergencia debo…", "o": ["Correr hacia donde está el incidente para ayudar", "Seguir las rutas de evacuación y reunirme en el punto de reunión asignado", "Salir del sitio sin avisar a nadie"], "a": 1},
     {"q": "Trabajar bajo efectos de alcohol o drogas en MRT…", "o": ["Está prohibido y es causa de sanción grave", "Se permite en festejos", "Solo está prohibido para operadores"], "a": 0}
   ],
   "C": [
     {"q": "Mi recibo de nómina (CFDI timbrado)…", "o": ["No es importante revisarlo", "Debo revisarlo cada periodo y aclarar dudas con RRHH", "Solo lo revisa mi jefe"], "a": 1},
     {"q": "Si vivo una situación de acoso o un acto contrario al código de ética…", "o": ["Lo dejo pasar para no tener problemas", "Lo reporto por el canal de denuncia o con RRHH; hay protección contra represalias", "Lo publico en redes sociales"], "a": 1},
     {"q": "Las faltas y retardos…", "o": ["No afectan en nada", "Se rigen por el reglamento interior de trabajo; debo avisar y justificar conforme al procedimiento", "Se negocian con los compañeros"], "a": 1}
   ],
   "P": [
     {"q": "El Plan 30·60·90 sirve para…", "o": ["Evaluarme sin que yo sepa los criterios", "Acordar con mi jefe qué debo lograr a los 30, 60 y 90 días y cómo se medirá", "Llenar un papel que nadie revisa"], "a": 1},
     {"q": "Mi padrino o madrina es…", "o": ["La persona que me acompaña, entrena y resuelve dudas mis primeros 90 días", "Mi jefe directo", "Alguien de otra empresa"], "a": 0},
     {"q": "Al día 90 se espera que yo…", "o": ["Apenas esté conociendo el puesto", "Desempeñe mi puesto de forma autónoma y al estándar, con seguridad", "Ya haya sido promovido"], "a": 1}
   ]
 }

<script>
/* ============================================================
   MRT Inducción Interactiva v2
   Mejoras: registro de usuario, Gun.js sync, panel de
   participantes en admin, exportación CSV
   ============================================================ */

/* --- Copia prístina para exportar versiones editadas --- */
var PRISTINE = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;

/* --- Configuración --- */
function readBakedCfg(){ return JSON.parse(document.getElementById("mrt-config").textContent); }
var BAKED = readBakedCfg();
var CFG = JSON.parse(JSON.stringify(BAKED));
try{
  var ov = localStorage.getItem("mrt_cfg");
  if(ov){ ov=JSON.parse(ov); if(ov&&ov.v===BAKED.version&&ov.cfg){ CFG=ov.cfg; } }
}catch(e){}

/* --- Room ID (URL hash) --- */
var roomId = window.location.hash.slice(1);
if(!roomId || roomId.length < 4){
  roomId = "mrt-" + Math.random().toString(36).substr(2,8);
  window.location.hash = roomId;
}

/* --- Gun.js --- */
var gun, gunRoom, gunReady = false;
try{
  gun = Gun({peers:["https://peer.wallie.io/gun"]});
  gunRoom = gun.get("mrt-induccion-" + roomId);
  gunReady = true;
}catch(e){ console.warn("Gun.js no disponible:", e); }

/* --- Estado del usuario --- */
var S = {
  role: null, name: "", email: "", empId: "", dept: "", startDate: "",
  done: {}, quiz: {}, mod: 0
};
try{
  var saved = localStorage.getItem("mrt_induccion_" + roomId);
  if(saved) Object.assign(S, JSON.parse(saved));
}catch(e){}
S.role = null; // siempre pedir rol al abrir

function save(){
  try{ localStorage.setItem("mrt_induccion_" + roomId, JSON.stringify(S)); }catch(e){}
  syncUser();
}
function saveCfgLocal(){
  try{ localStorage.setItem("mrt_cfg", JSON.stringify({v:BAKED.version,cfg:CFG})); }catch(e){}
}
function notify(m){ try{ alert(m); }catch(e){} }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

/* --- Rutas para admin --- */
function getPath(obj,path){ return path.split(".").reduce(function(o,k){ return (o||{})[k]; },obj); }
function setPath(obj,path,val){ var ks=path.split("."),o=obj; for(var i=0;i<ks.length-1;i++){ o=o[ks[i]]; } o[ks[ks.length-1]]=val; }

/* --- Sync a Gun.js --- */
function syncUser(){
  if(!gunReady || !S.email) return;
  var uid = S.email.replace(/[^a-zA-Z0-9]/g,"_");
  var keys = ["PRE","A","B","C","P"];
  var totalModules = ["inicio","PRE","A","B","C","D","P","CHK"];
  var doneCount = totalModules.filter(function(k){ return S.done[k]; }).length;
  var pct = Math.round(doneCount / totalModules.length * 100);
  var avgQuiz = 0;
  var quizCount = 0;
  keys.forEach(function(k){ if(S.quiz[k]){ avgQuiz += S.quiz[k]; quizCount++; } });
  avgQuiz = quizCount ? Math.round(avgQuiz / quizCount) : 0;
  var data = {
    name: S.name, email: S.email, empId: S.empId||"", dept: S.dept||"",
    startDate: S.startDate || new Date().toISOString().split("T")[0],
    lastUpdate: new Date().toISOString(),
    pct: pct, avgQuiz: avgQuiz,
    donePRE: S.done["PRE"]?1:0, doneA: S.done["A"]?1:0,
    doneB: S.done["B"]?1:0, doneC: S.done["C"]?1:0,
    doneD: S.done["D"]?1:0, doneP: S.done["P"]?1:0,
    doneCHK: S.done["CHK"]?1:0, doneFIN: S.done["FIN"]?1:0,
    quizPRE: S.quiz["PRE"]||0, quizA: S.quiz["A"]||0,
    quizB: S.quiz["B"]||0, quizC: S.quiz["C"]||0, quizP: S.quiz["P"]||0
  };
  gunRoom.get("participants").get(uid).put(data);
}

/* --- Login / pantalla de acceso --- */
function renderLogin(msg){
  document.getElementById("app").innerHTML =
  '<div class="login-wrap"><div class="login">' +
  '<h1>MRT</h1><p class="gold">Inducción interactiva · Empresa y puesto</p>' +
  '<p style="margin:14px 0">Selecciona tu perfil para continuar:</p>' +
  '<button class="rolebtn" onclick="enterUser()">Soy nuevo ingreso<small>Comenzar o continuar mi inducción</small></button>' +
  '<button class="rolebtn" onclick="showAdminLogin()">Administrador (RRHH)<small>Gestionar participantes, editar contenido y exportar resultados</small></button>' +
  '<div id="adminlogin" style="display:none;margin-top:14px;text-align:left">' +
  '<div class="field"><label>Contraseña de administrador</label><input type="password" id="adminpass" placeholder="Contraseña" onkeydown="if(event.key===\'Enter\')tryAdmin(this.value)"></div>' +
  '<button class="btn dark" onclick="tryAdmin(document.getElementById(\'adminpass\').value)">Entrar como administrador</button>' +
  '<div id="adminerr" style="color:var(--bad);font-weight:700;font-size:13px;margin-top:6px"></div></div>' +
  (msg?'<p style="color:var(--bad);font-weight:700;margin-top:10px">'+esc(msg)+'</p>':'') +
  '<p class="locknote" style="margin-top:18px">Sincroniza en tiempo real. Tu progreso se guarda automáticamente.</p>' +
  '</div></div>';
}
function showAdminLogin(){
  var d=document.getElementById("adminlogin");
  d.style.display = d.style.display==="none"?"block":"none";
}
function enterUser(){ S.role="user"; render(); }
function tryAdmin(pass){
  if(pass===CFG.adminPass){ S.role="admin"; renderAdmin(); }
  else{ var e=document.getElementById("adminerr"); if(e) e.textContent="Contraseña incorrecta."; }
}
function logout(){ S.role=null; renderLogin(); }

/* --- Quiz HTML --- */
function quizHTML(key){
  var qz=CFG.quizzes[key]||[];
  var passed = S.quiz[key]>=80;
  var h='<div class="card"><h3 style="margin-top:0">📝 Evaluación del módulo '+(passed?'— <span style="color:var(--ok)">APROBADA ('+S.quiz[key]+'%)</span>':'')+
  '</h3><p>Selecciona una respuesta por pregunta. Necesitas 80% para aprobar.</p>';
  qz.forEach(function(item,qi){
    h+='<div class="q" data-key="'+key+'" data-q="'+qi+'"><p>'+(qi+1)+'. '+esc(item.q)+'</p>';
    item.o.forEach(function(o,oi){ h+='<span class="opt" onclick="pick(this,\''+key+'\','+qi+','+oi+')">'+esc(o)+'</span>'; });
    h+='<div class="feedback"></div></div>';
  });
  h+='<button class="btn" onclick="grade(\''+key+'\','+qz.length+')">Calificar</button><div class="score" id="score-'+key+'"></div></div>';
  return h;
}

/* --- Módulos --- */
var MODS = [

/* --- Lógica de quiz --- */
var picks={};
function pick(el,key,qi,oi){
  picks[key]=picks[key]||{}; picks[key][qi]=oi;
  var sibs=el.parentElement.querySelectorAll(".opt");
  for(var i=0;i<sibs.length;i++){ sibs[i].classList.remove("sel"); }
  el.classList.add("sel");
}
function grade(key,n){
  var p=picks[key]||{};
  if(Object.keys(p).length<n){ notify("Responde todas las preguntas antes de calificar."); return; }
  var ok=0;
  var qdivs=document.querySelectorAll('.q[data-key="'+key+'"]');
  for(var d=0;d<qdivs.length;d++){
    var qdiv=qdivs[d],qi=+qdiv.getAttribute("data-q"),ans=CFG.quizzes[key][qi].a,sel=p[qi];
    var opts=qdiv.querySelectorAll(".opt");
    for(var oi=0;oi<opts.length;oi++){
      opts[oi].classList.remove("right","wrong");
      if(oi===ans) opts[oi].classList.add("right");
      else if(oi===sel) opts[oi].classList.add("wrong");
    }
    var fb=qdiv.querySelector(".feedback"); fb.style.display="block";
    if(sel===ans){ ok++; fb.textContent="✔ Correcto"; fb.style.color="var(--ok)"; }
    else{ fb.textContent="✘ Revisa la respuesta marcada en verde"; fb.style.color="var(--bad)"; }
  }
  var pct=Math.round(ok/n*100);
  var sc=document.getElementById("score-"+key); sc.style.display="block";
  if(pct>=80){
    sc.textContent="Resultado: "+pct+"% — ¡Módulo aprobado! Continúa con la siguiente sección."; sc.style.color="var(--ok)";
    S.quiz[key]=pct; S.done[key]=true; save(); renderNav();
  }else{
    sc.textContent="Resultado: "+pct+"% — Aún no apruebas. Repasa el contenido e inténtalo de nuevo."; sc.style.color="var(--bad)";
  }
}
function markDone(k){ S.done[k]=true; save(); renderNav(); notify("Sección registrada como completada ✓"); }
function setName(){
  var n=document.getElementById("inpname").value.trim();
  var e=document.getElementById("inpemail").value.trim();
  if(!n||!e){ notify("Nombre y correo son requeridos para comenzar."); return; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)){ notify("Ingresa un correo electrónico válido."); return; }
  S.name=n; S.email=e;
  S.empId=document.getElementById("inpempid").value.trim();
  S.dept=document.getElementById("inpdept").value.trim();
  if(!S.startDate) S.startDate=new Date().toISOString().split("T")[0];
  S.done["inicio"]=true; save(); go(1);
}
function resetUser(){
  try{ localStorage.removeItem("mrt_induccion_"+roomId); }catch(e){}
  S={role:"user",name:"",email:"",empId:"",dept:"",startDate:"",done:{},quiz:{},mod:0};
  render();
}
function go(i){ S.mod=i; save(); render(); window.scrollTo(0,0); }

function renderNav(){
  var req=["inicio","PRE","A","B","C","D","P","CHK"];
  var doneCount=req.filter(function(k){return S.done[k];}).length;
  var pct=Math.round(doneCount/req.length*100);
  var pb=document.getElementById("pbar"),pt=document.getElementById("ptxt"),nv=document.getElementById("nav");
  if(!pb) return;
  pb.style.width=pct+"%";
  pt.textContent=pct+"% completado"+(S.name?" · "+S.name.split(" ")[0]:"");
  nv.innerHTML=MODS.map(function(m,i){
    return '<div class="navitem '+(i===S.mod?"active":"")+' '+(S.done[m.id]?"done":"")+'" onclick="go('+i+')">' +
    '<span class="dot">'+(S.done[m.id]?"✓":"")+'</span><span>'+m.nav+'</span></div>';
  }).join("");
}

function syncIndicator(){
  if(!gunReady) return '';
  return '<div class="sync-bar noprint"><span class="sync-dot live"></span><span>Sincronizando en tiempo real · Sala: <b>'+roomId+'</b></span></div>';
}

function render(){
  if(S.role!=="user"){ renderLogin(); return; }
  document.getElementById("app").innerHTML =
  '<div class="layout"><aside><h1>MRT</h1><div class="sub">Inducción interactiva · Nuevo ingreso</div>' +
  '<div class="progresswrap"><div class="progressbar"><div id="pbar"></div></div><div class="progresstxt" id="ptxt"></div></div>' +
  '<div id="nav"></div>' +
  '<div class="navitem" onclick="logout()" style="margin-top:14px;opacity:.7">⎋ Salir / cambiar perfil</div></aside>' +
  '<main id="main"></main></div>';
  document.getElementById("main").innerHTML =
    syncIndicator() +
    MODS[S.mod].render() +
    (S.mod>0&&S.mod<MODS.length-1?'<button class="btn sec noprint" onclick="go('+(S.mod+1)+')">Siguiente sección →</button>':'');
  renderNav();
}

function fld(label,path,type,lines){
  var val=getPath(CFG,path);
  if(lines){ val=(val||[]).join("\n"); }
  if(type==="ta"||lines){
    return '<div class="field"><label>'+esc(label)+'</label><textarea data-path="'+path+'" '+(lines?'data-lines="1"':'')+'>'+esc(val)+'</textarea></div>';
  }
  return '<div class="field"><label>'+esc(label)+'</label><input type="text" data-path="'+path+'" value="'+esc(val)+'"></div>';
}
function quizEditor(){
  var h='';
  var names={PRE:"Antes de tu primer día",A:"Módulo A · Identidad",B:"Módulo B · Seguridad",C:"Módulo C · RRHH",P:"Inducción al puesto"};
  Object.keys(CFG.quizzes).forEach(function(key){
    h+='<h3 style="margin-top:16px">'+esc(names[key]||key)+' <button class="btn sec" style="padding:4px 12px;font-size:12px;margin:0" onclick="addQ(\''+key+'\')">+ pregunta</button></h3>';
    CFG.quizzes[key].forEach(function(item,qi){
      h+='<div class="qz-block" data-quiz="'+key+'" data-idx="'+qi+'">' +
      '<button class="del" onclick="delQ(\''+key+'\','+qi+')">Eliminar</button>' +
      '<div class="field"><label>Pregunta '+(qi+1)+'</label><textarea class="qz-q">'+esc(item.q)+'</textarea></div>';
      item.o.forEach(function(o,oi){ h+='<div class="qz-block" style="background:none;border:none;padding:4px 0"><div style="display:flex;gap:8px;align-items:center"><span style="font-size:12px;font-weight:700;width:18px">'+String.fromCharCode(65+oi)+'</span><input type="text" class="qz-o" value="'+esc(o)+'"></div></div>'; });
      h+='<div style="display:flex;gap:8px;margin-top:6px;align-items:center"><span style="font-size:12px;font-weight:700;width:18px">✔</span><select class="qz-a">'+
      item.o.map(function(_,oi){return '<option value="'+oi+'" '+(item.a===oi?"selected":"")+'>Correcta: '+String.fromCharCode(65+oi)+'</option>';}).join("")+
      '</select></div></div>';
    });
  });
  return h;
}
function addQ(key){ collectAdmin(); CFG.quizzes[key].push({q:"Nueva pregunta…",o:["Opción A","Opción B","Opción C"],a:0}); renderAdmin(); }
function delQ(key,qi){ collectAdmin(); CFG.quizzes[key].splice(qi,1); renderAdmin(); }
function collectAdmin(){
  var inputs=document.querySelectorAll("[data-path]");
  for(var i=0;i<inputs.length;i++){
    var el=inputs[i],v=el.value;
    if(el.getAttribute("data-lines")){ v=v.split("\n").map(function(x){return x.trim();}).filter(function(x){return x;}); }
    setPath(CFG,el.getAttribute("data-path"),v);
  }
  for(var k=0;k<4;k++){
    var ni=document.getElementById("val-n-"+k),di=document.getElementById("val-d-"+k);
    if(ni&&di){ CFG.empresa.valores[k]={n:ni.value,d:di.value}; }
  }
  var blocks=document.querySelectorAll(".qz-block[data-quiz]");
  var nq={};
  for(var b=0;b<blocks.length;b++){
    var bl=blocks[b],key=bl.getAttribute("data-quiz");
    nq[key]=nq[key]||[];
    var qel=bl.querySelector(".qz-q"); if(!qel) continue;
    var q=qel.value;
    var os=bl.querySelectorAll(".qz-o"),oarr=[];
    for(var o=0;o<os.length;o++){ oarr.push(os[o].value); }
    var asel=bl.querySelector(".qz-a");
    var a=asel?parseInt(asel.value,10)||0:0;
    nq[key].push({q:q,o:oarr,a:a});
  }
  if(Object.keys(nq).length){ Object.keys(nq).forEach(function(k){ CFG.quizzes[k]=nq[k]; }); }
}

  collectAdmin();
  var out=JSON.parse(JSON.stringify(CFG)); out.version=Date.now();
  var json=JSON.stringify(out,null,1);
  var open='<script id="mrt-config" type="application/json">';
  var i0=PRISTINE.indexOf(open), i1=PRISTINE.indexOf("<\/script>",i0);
  return PRISTINE.slice(0,i0+open.length)+json+PRISTINE.slice(i1);
}

/* --- Participantes y exportación CSV --- */
var participantsCache = [];

function loadParticipants(cb){
  if(!gunReady){ cb([]); return; }
  var list=[];
  var seen={};
  gunRoom.get("participants").map().once(function(data,key){
    if(data&&data.name&&data.email&&!seen[key]){
      seen[key]=true;
      list.push(data);
    }
  });
  setTimeout(function(){ participantsCache=list; cb(list); }, 900);
}

function pctBar(v){
  v=Math.min(100,Math.max(0,v||0));
  return '<span class="pct-bar"><span class="pct-bar-fill" style="width:'+v+'%"></span></span>'+v+'%';
}
function doneBadge(v){ return v?'<span class="badge ok">✓ OK</span>':'<span class="badge pend">Pendiente</span>'; }

function renderParticipantsTable(list){
  var c=document.getElementById("participants-container");
  if(!c) return;
  if(!list.length){
    c.innerHTML='<p style="color:#999;font-size:14px;">Aún no hay participantes registrados en esta sala. Comparte la URL con los nuevos ingresos.</p>';
    return;
  }
  var h='<p style="font-size:13px;margin-bottom:10px;color:#555;"><b>'+list.length+'</b> participante(s) encontrado(s). Última actualización al cargar la página.</p>';
  h+='<div style="overflow-x:auto"><table class="p-table">' +
  '<tr><th>Nombre</th><th>Correo</th><th>No. Emp.</th><th>Área</th><th>Avance</th>' +
  '<th>PRE</th><th>Módulo A</th><th>Módulo B</th><th>Módulo C</th><th>Módulo D</th><th>Puesto</th><th>Checklist</th><th>Constancia</th><th>Promedio Quiz</th><th>Última actividad</th></tr>';
  list.forEach(function(p){
    var lu=p.lastUpdate?new Date(p.lastUpdate).toLocaleDateString("es-MX",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}):"—";
    h+='<tr>' +
    '<td><b>'+esc(p.name)+'</b></td>' +
    '<td>'+esc(p.email)+'</td>' +
    '<td>'+esc(p.empId||"—")+'</td>' +
    '<td>'+esc(p.dept||"—")+'</td>' +
    '<td>'+pctBar(p.pct)+'</td>' +
    '<td>'+doneBadge(p.donePRE)+'</td>' +
    '<td>'+doneBadge(p.doneA)+'</td>' +
    '<td>'+doneBadge(p.doneB)+'</td>' +
    '<td>'+doneBadge(p.doneC)+'</td>' +
    '<td>'+doneBadge(p.doneD)+'</td>' +
    '<td>'+doneBadge(p.doneP)+'</td>' +
    '<td>'+doneBadge(p.doneCHK)+'</td>' +
    '<td>'+(p.doneFIN?'<span class="badge ok">✓ Completada</span>':'<span class="badge no">Pendiente</span>')+'</td>' +
    '<td><b>'+(p.avgQuiz||0)+'%</b></td>' +
    '<td style="font-size:12px">'+lu+'</td>' +
    '</tr>';
  });
  h+='</table></div>';
  c.innerHTML=h;
}

function exportCSV(){
  if(!participantsCache.length){ notify("No hay participantes para exportar."); return; }
  var BOM="﻿";
  var headers=["Nombre","Correo","No. Empleado","Departamento","Fecha inicio","Última actividad",
    "Avance %","Pre-inducción","Módulo A","Módulo B","Módulo C","Módulo D","Inducción al puesto",
    "Checklist","Constancia emitida","Quiz PRE %","Quiz A %","Quiz B %","Quiz C %","Quiz Puesto %","Promedio Quiz %"];
  var rows=[headers];
  participantsCache.forEach(function(p){
    rows.push([
      p.name||"", p.email||"", p.empId||"", p.dept||"",
      p.startDate||"", p.lastUpdate?new Date(p.lastUpdate).toLocaleString("es-MX"):"",
      (p.pct||0)+"%",
      p.donePRE?"Aprobado":"Pendiente", p.doneA?"Aprobado":"Pendiente",
      p.doneB?"Aprobado":"Pendiente", p.doneC?"Aprobado":"Pendiente",
      p.doneD?"Revisado":"Pendiente", p.doneP?"Aprobado":"Pendiente",
      p.doneCHK?"Completado":"Pendiente", p.doneFIN?"Sí":"No",
      (p.quizPRE||0)+"%", (p.quizA||0)+"%", (p.quizB||0)+"%",
      (p.quizC||0)+"%", (p.quizP||0)+"%", (p.avgQuiz||0)+"%"
    ]);
  });
  var csv=BOM+rows.map(function(r){ return r.map(function(c){ return '"'+String(c).replace(/"/g,'""')+'"'; }).join(","); }).join("\r\n");
  try{
    var blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
    var a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download="MRT_Participantes_"+new Date().toISOString().slice(0,10)+".csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }catch(e){ notify("Error al generar CSV."); }
}

function refreshParticipants(){
  var c=document.getElementById("participants-container");
  if(c) c.innerHTML='<p style="color:#999;font-size:13px;">Cargando participantes…</p>';
  loadParticipants(function(list){ renderParticipantsTable(list); });
}
